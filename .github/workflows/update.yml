name: Update events daily

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        run: python aggregate.py

      - name: Commit updated events.json
        run: |
          git config user.name "lyon-events-bot"
          git config user.email "actions@github.com"
          git add events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update events ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
